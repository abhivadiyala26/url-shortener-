<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shortly</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <h2><i class="bx bx-link-alt"></i>Shortly</h2>
  <a href="index.html" class="nav-link"><i class="bx bx-left-arrow-alt"></i> Home</a>
</nav>

<div class="auth-container" id="login-form-container">
  <div class="auth-card">
    <div class="auth-logo-container">
      <div class="auth-logo-badge">
        <i class="bx bx-link-alt"></i>
      </div>
    </div>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to manage your shortened links</p>

    <div id="auth-error" class="auth-error d-none">
      <i class="bx bx-error-circle"></i>
      <span id="error-text"></span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-container">
          <i class="bx bx-user"></i>
          <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-container">
          <i class="bx bx-lock-alt"></i>
          <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
          <i class="bx bx-hide password-toggle" onclick="togglePasswordVisibility('login-password', this)"></i>
        </div>
      </div>

      <div class="form-helper">
        <label class="checkbox-container">
          <input type="checkbox" id="remember-me">
          <span class="checkbox-custom"></span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
        <span>Login</span>
        <div class="loader d-none"></div>
      </button>
    </form>

    <p>
      Don't have an account? 
      <a href="signup.html">Create one</a>
    </p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
