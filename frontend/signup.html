<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Shortly</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <h2><i class="bx bx-link-alt"></i>Shortly</h2>
  <a href="index.html" class="nav-link"><i class="bx bx-left-arrow-alt"></i> Home</a>
</nav>

<div class="auth-container" id="signup-form-container">
  <div class="auth-card">
    <div class="auth-logo-container">
      <div class="auth-logo-badge">
        <i class="bx bx-user-plus"></i>
      </div>
    </div>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join us to start shortening your links</p>

    <div id="auth-error" class="auth-error d-none">
      <i class="bx bx-error-circle"></i>
      <span id="error-text"></span>
    </div>

    <form onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-username">Username</label>
        <div class="input-container">
          <i class="bx bx-user"></i>
          <input type="text" id="signup-username" placeholder="Choose a username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <div class="input-container">
          <i class="bx bx-envelope"></i>
          <input type="email" id="signup-email" placeholder="Enter your email" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <div class="input-container">
          <i class="bx bx-lock-alt"></i>
          <input type="password" id="signup-password" placeholder="Create a password" required autocomplete="new-password">
          <i class="bx bx-hide password-toggle" onclick="togglePasswordVisibility('signup-password', this)"></i>
        </div>
        <div id="password-strength-container" class="password-strength-container d-none">
          <div class="strength-meter-bar">
            <div id="strength-meter-fill" class="strength-meter-fill"></div>
          </div>
          <span id="strength-meter-label" class="strength-meter-label">Weak</span>
        </div>
      </div>

      <div class="form-helper" style="margin-top: 0.5rem;">
        <label class="checkbox-container">
          <input type="checkbox" id="agree-terms" required>
          <span class="checkbox-custom"></span>
          I agree to the Terms of Service
        </label>
      </div>

      <button type="submit" id="signup-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
        <span>Sign Up</span>
        <div class="loader d-none"></div>
      </button>
    </form>

    <p>
      Already have an account? 
      <a href="login.html">Login</a>
    </p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
