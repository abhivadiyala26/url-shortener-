spring.application.name=urlshortener

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:urldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
security.jwt.secret-key=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
security.jwt.expiration-time=86400000

# Static Resource Locations (Live Development Reload)
spring.web.resources.static-locations=file:../frontend/,file:frontend/,classpath:/static/,classpath:/public/

